<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/style.css">
    <title>Login & Sign up</title>
</head>
<body>

<class="container" id="container">
    <div class="logo-box">
        <a href="homepage.html">
        <img src="Pictures/bismac.png" alt="BISMAC logo">
        </a>    
    </div>
</class>

<div class="container" id="container">
    <div class="form-box login">
        <form action="">
            <h1>Login</h1>
            <div class="input-box">
                <input type="text" required>
                <i class='bx bxs-user'></i>
                <span>Username</span>
            </div>

            <div class="input-box">
                <input type="password" id="login-pass" required>
                <img src="Pictures/hide.png" id="login-eye">
                <span>Password</span>
            </div>
            <div class="forgot-link">
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" class="btn">
              Login
            <i class="bx bx-arrow-to-right"></i>
         </form>
    </div>

    <div class="form-box register">
        <form action="">
            <h1>Signup</h1>

        <div class="name-fields">
            <div class="input-box">
             <input type="text" required>
                 <i class='bx bxs-user'></i>
             <span>First Name</span>
         </div>

         <div class="input-box">
           <input type="text" required>
            <i class='bx bxs-user'></i>
             <span>Last Name</span>
          </div>
        </div>
                
            <div class="input-box">
                <input type="text" required>
                <i class='bx bxs-user'></i>
                <span>Username</span>
            </div>

            <div class="input-box">
                <input type="Email" required>
                <i class='bx bxs-user'></i>
                <span>Email</span>
            </div>


        <div class="input-box">
           <input type="password" id="reg-pass" minlength="5" required>
             <img src="Pictures/hide.png" class="eye-icon" onclick="togglePass('reg-pass', this)">
        <span>Password</span>
        </div>
    
    <div class="input-box">
      <input type="password" id="confirm-pass" required>
      <img src="Pictures/hide.png" onclick="togglePass('confirm-pass', this)">
      <span>Confirm Password</span>
    </div>
        <p id="msg" style="color: #ff4d4d; font-size: 12px; margin-top: -10px; display: none;"></p>
            <button type="submit" class="btn">
              Sign up
             <i class='bx bx-arrow-to-right'></i>
</button> 
        </form>
    </div>

    <div class="toggle-box">
        <div class="toggle-panel toggle-left">
            <h1>Hello, Welcome!</h1>
            <p>Don't have an account?</p>
            <button class="btn register-btn" id="register">Sign up</button>
        </div>
        <div class="toggle-panel toggle-right">
            <h1>Hello, You're Back!</h1>
            <p>Already have an account?</p>
            <button class="btn login-btn" id="login">Login</button>
        </div>
    </div>
</div>

<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(-45deg, #be3535, #662323, #8f3636, #14010167);
    background-size: 400% 400%;
    animation: gradientBG 5s ease infinite;
}

@keyframes gradientBG {
    0% {
        background-position: 0% 50%;
    }
    50% {
        background-position: 100% 50%; 
    }
    100% {
        background-position: 0% 50%;
    }
}

.container {
    position: relative;
    width: 850px;
    height: 550px;
    background: #ffffff;
    border-radius: 30px;
    box-shadow: 0 0 30px rgba(0, 0, 0, 0.2);
    margin: 20px;
    overflow: hidden;
}

.logo-box {
    position: absolute;
    top: 50px;
    left: 10px;
    transform: translateY(-50%);
    z-index: 5;

    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.302);
    padding: 10px 25px;
    border-radius: 15px;

    display: flex;
    justify-content: center;
    align-items: center;

    box-shadow: 0 5px 15px rgba(242, 0, 0, 0.2);
    transition: all 0.4s ease;
}

.logo-box img{
    width: 180px;
    height: auto;
    cursor: pointer;
    transform: .3s ease;
}

.logo-box:hover img{
    transform: scale(1.1);
}

.container.active .logo-box{
    background: rgba(83, 24, 24, 0.8);
}

.form-box {
    position: absolute;
    right: 0;
    width: 50%;
    height: 100%;
    background: #fff;
    display: flex;
    align-items: center;
    color: #333;
    text-align: center;
    padding: 40px;
    z-index: 1;
    transition: 0.6s ease-in-out 1.2s;
}

.form-box.login {
    visibility: visible;
    opacity: 1;
    transition: visibility 0s, opacity 0.6s 0.6s ease-in-out 1.2s;
}

.form-box.register {
    visibility: hidden;
    opacity: 0;
    transition: visibility 0s, opacity 0.6s;
}

.form-box input:valid ~ span,
.form-box input:focus ~ span{
    color: #373737;
    transform: translateY(20px) translateY(-50px);
    font-size: 0.65rem;
    font-weight: 600;
    padding: 0 10px;
    background: #fff;
    letter-spacing: 0.1rem;
}

.container.active .form-box {
    right: 50%;
}

.container.active .form-box.login {
    visibility: hidden;
    opacity: 0;
    transition: visibility 0s 0.6s, opacity 0.6s;
}

.name-fields{
    display: flex;
    gap: 15px;
    margin: 20px 0;
}

.name-fields .input-box{
    width: 100%;
    margin: 0;
}

.container.active .form-box.register {
    visibility: visible;
    opacity: 1;
    z-index: 2; 
    transition: visibility 0s 0.6s, opacity 0.6s 0.6s ease-in-out 1.2s;
}

form {
    width: 100%;
}

.container h1{
    font-size: 36px;
    margin: 2px 0;
}

.input-box{
    position: relative;
    margin: 20px 0;
    display: flex;
    align-items: center;
}

.input-box input{
    width: 100%;
    padding: 13px 50px 13px 20px;
    background: #eee;
    border-radius: 8px;
    border: none;
    outline: none; 
    font-size: 16px;
    color: #333;
    font-weight: 500;
}

.input-box span{
    position: absolute;
    left: 0;
    padding: 10px;
    font-size: 1rem;
    color: rgb(49, 43, 43);
    pointer-events: none;
}

.input-box input:valid ~ span,
.input-box input:focus ~ span{
    color: #373737;
    transform: translateY(20px) translateY(-50px);
    font-size: 0.65rem;
    font-weight: 600;
    padding: 0 10px;
    background: #fff;
    letter-spacing: 0.1rem;
}

.input-box input::placeholder{
    color: #888;
    font-weight: 400;
}

.input-box input:focus{
    outline: 2px solid #501313;
    box-shadow: 0 0 5px rgba(116, 148, 236, 0, 5 );
    transition: .1s ease;
}

.input-box i{
    color: #420c0c;
    position: absolute;
    right: 20px;
    top: 23px;
    transform: translateY(-50%);
    font-size: 20px;
}

.input-box img{
    width: 24px;
    cursor: pointer;
    right: auto;
    position: absolute;
    right: 20px;
}

.forgot-link{
    margin: -15px 0 15px;
}

.forgot-link a{
    font-size: 14.5px;
    color: #333;
    text-decoration: none;
    transition: all 0.3s ease;
}

.btn{
    width: 100%;
    height: 48px;
    background: rgb(83, 24, 24);
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, .1);
    border: none;
    cursor: pointer;
    font-size: 16px;
    color: #ffffff;
    font-weight: 600;

    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px; /* space between text and icon */
}

.btn i{
    font-size: 18px;
    transition: transform .3s ease;
}

.btn:hover i{
    transform: translateX(5px);
}

.container p{
    font-size: 14.5px;
    margin: 15px 0;
}

.toggle-box{
    position: absolute;
    width: 100%;
    height: 100%
}

.toggle-box::before {
    content: '';
    left: -250%;
    border-radius: 150px;
    position: absolute;
    width: 300%;
    height: 100%;
    background: rgb(180, 42, 42);
    z-index: 2;
    transition: 1.8s ease-in-out;
}

.container.active .toggle-box::before{
    left: 50%;
}

.toggle-panel{
    position: absolute;
    width: 50%;
    height: 100%;
    color: #fff;
    display: flex;
    flex-direction: column;
    text-align: center;
    align-items: center;
    justify-content: center;
    z-index: 2;
    transition: .6s ease-in-out;
}

.toggle-panel.toggle-left{
    left: 0;
    transition-delay: 1.2s;
}

.container.active .toggle-panel.toggle-left{
    left: -50%;
    transition-delay: 0.1s;
}

.toggle-panel.toggle-right{
    right: -50%;
    transition-delay: 0.1s;
}

.container.active .toggle-panel.toggle-right{
    right: 0;
    transition-delay: 1.2s;
}

.toggle-panel p{
    margin-bottom: 20px;
}

.toggle-panel .btn{
    width: 160px;
    height: 46px;
    background: transparent;
    border: 2px solid #ffffff;
    box-shadow: none;
    color: #ffffff;
    position: relative;
    overflow: hidden;
    z-index: 1;
    transition: color .4s ease;
}

.toggle-panel .btn::before{
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: #ffffff;
    transition: center .10rs ease;
    z-index: -1;
}

.toggle-panel .btn:hover::before{
    left: 0;
}

.toggle-panel .btn:hover{
    color: rgb(69, 4, 4);
}

#msg {
    font-weight: 500;
    margin-bottom: 10px;
    animation: fadeIn 0.3s ease;
}

.error-border {
    border: 1px solid #ff4d4d !important;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
}

@media screen and (max-width: 650px) {
    .container{
        height: calc(100vh -40px);
    }
    .form-box{
        bottom: 0;
        width: 100%;
        height: 70%
    }
    .container.active .form-box{
        right: 0;
        bottom: 30%;
    }
    .toggle-box::before{
        left: 0;
        top: -270%;
        width: 100%;
        height: 300%;
        border-radius: 20vw;
    }
    .container.active .toggle-box::before{
        left: 0;
        top: 70%;
    }
    .toggel-panel{
        width: 100%;
        height: 30%;
    }
    .toggle-panel.toggle-left{
        top: 0;
    }
    .container.active .toggle-panel.toggle-left{
        left: 0;
        top: -30%;
    }
    .toggle-panel.toggle-right{
        right: 0;
        bottom: -30%;
    }
    .container.active .toggle-panel.toggle-right{
        bottom: 0;
    }
}
@media screen and (max-width: 650px) {
    .form-box{
        padding: 20px;
    }
    .toggle-panel h1{
        font-size: 30px;
    }

    .toggle-box::before{
        left: 0;
        top: -270%;
        width: 100%;
        height: 300%;
        border-radius: 20vw;
    }
    .container.active .toggle-box::before{
        left: 0;
        top: 70%;
    }
    .toggle-panel{
        width: 100%;
        height: 30%;
    }
    .toggle-panel.toggle-left{
        top: 0;
    }
    .container.active .toggle-panel.toggle-left{
        left: 0;
        top: -30%;
    }
    .toggle-panel.toggle-right{
        right: 0;
        bottom: -30%;
    }
    .container.active .toggle-panel.toggle-right{
        bottom: 0;
    }

}
@media screen and (max-width: 650px) {
    .form-box{
        padding: 20px;
    }
    .toggle-panel h1{
        font-size: 30px
    }
}
</style>

<script>
    const container = document.querySelector('.container');
const registerBtn = document.querySelector('#register');
const loginBtn = document.querySelector('#login');

registerBtn.addEventListener('click', () => {
    container.classList.add('active');
});

loginBtn.addEventListener('click', () => {
    container.classList.remove('active');
});

let loginEye = document.getElementById("login-eye");
let loginPass = document.getElementById("login-pass");

loginEye.onclick = function(){
    if(loginPass.type == "password"){
        loginPass.type = "text";
        loginEye.src = "Pictures/view.png";
    } else {
        loginPass.type = "password";
        loginEye.src = "Pictures/hide.png";
    }
}

let regEye = document.getElementById("reg-eye");
let regPass = document.getElementById("reg-pass");

regEye.onclick = function(){
    if(regPass.type == "password"){
        regPass.type = "text";
        regEye.src = "Pictures/view.png";
    } else {
        regPass.type = "password";
        regEye.src = "Pictures/hide.png";
    }
}

document.querySelector('form').addEventListener('submit', function(e) {
    const pass = document.getElementById('reg-pass');
    const confirmPass = document.getElementById('confirm-pass');
    const msg = document.getElementById('msg');

    msg.style.display = 'none';

    if (pass.value.length < 8) {
        e.preventDefault();
        msg.textContent = "Password must be at least 8 characters long.";
        msg.style.display = 'block';
        pass.classList.add('error-border');
        return;
    }

    if (pass.value !== confirmPass.value) {
        e.preventDefault(); 
        msg.textContent = "Passwords do not match!";
        msg.style.display = 'block';
        confirmPass.classList.add('error-border');
    }
});

function togglePass(id, icon) {
    const input = document.getElementById(id);
    if (input.type === "password") {
        input.type = "text";
        icon.src = "Pictures/view.png";
    } else {
        input.type = "password";
        icon.src = "Pictures/hide.png";
    }
}
</script>

</body>
</html>
